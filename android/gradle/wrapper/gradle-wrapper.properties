distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# Bumped from 8.2.1 → 8.9 because Capacitor 6 plugins (notably
# @aparajita/capacitor-biometric-auth via its transitive BouncyCastle
# dependency) ship Java 21 class files in META-INF/versions/21/. Gradle
# 8.2.1's ASM bytecode reader rejects them with
#   "Unsupported class file major version 65"
# at instrumentation time. Gradle 8.5+ ships an ASM that handles Java 21.
distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-all.zip
networkTimeout=60000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
